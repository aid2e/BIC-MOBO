name: bic-mobo
channels:
  - conda-forge
dependencies:
  - python=3.11.5
  - pip
  - pip:
    # Core Ax and optimization dependencies
    - ax-platform==1.0.0
    - torch
    - pandas
    - numpy
    - matplotlib
    - seaborn
    - wandb
    - botorch
    
    # Scheduler (base version without PanDA support)
    # For PanDA support, use bic-mobo-panda.yml instead
    - git+https://github.com/aid2e/scheduler_epic.git
    
    # Additional dependencies
    - cloudpickle
    - joblib
    
    # BIC-MOBO core packages (local installation)
    - -e .
